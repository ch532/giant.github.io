<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>150 Level Adventure</title>
    <style>
        /* Basic styling to center the game and make it look professional */
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
        }
        canvas { 
            border: 2px solid #333; 
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%; 
            max-height: 100%; 
            image-rendering: pixelated; /* Keeps the game looking sharp */
        }
    </style>
    <!-- Playgama Bridge SDK - Required for Ads, Storage, and Payments -->
<script async src="https://widgets.playgama.com/index.js"></script>
</head>
<body>
    <script>
        // 2. Initialize the SDK
        window.addEventListener('load', () => {
            bridge.initialize()
                .then(() => {
                    console.log('Playgama SDK initialized!');
                    // Now you can use the SDK
                })
                .catch(error => {
                    console.error('Initialization failed', error);
                });
        });
    </script>
    
    <canvas id="gameCanvas"></canvas>

    <!-- Load your game logic -->
    <script src="game.js"></script>

</body>
</html>
