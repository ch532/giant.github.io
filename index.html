<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>150 Level Adventure</title>
    <style>
        /* Basic styling to center the game and make it look professional */
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: Arial, sans-serif;
            /* Prevent unwanted scrolling or selections on mobile device screens */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas { 
            border: 2px solid #333; 
            background-color: #111;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 100%; 
            max-height: 100%; 
            image-rendering: pixelated; /* Keeps the game looking sharp */
        }
    </style>
    <script src="https://bridge.playgama.com/v1/stable/playgama-bridge.js"></script> 
</head>
<body>
    
    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>

</body>
</html>
