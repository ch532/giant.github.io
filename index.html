<script>
  function decodeJWT(token) {
    let base64Url = token.split(".")[1];
    let base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
    let jsonPayload = decodeURIComponent(atob(base64).split("").map(c => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2)).join(""));
    return JSON.parse(jsonPayload);
  }

  function handleCredentialResponse(response) {
    const responsePayload = decodeJWT(response.credential);
    // Hide login box, show dictionary and search
    document.getElementById("login-section").style.display = "none";
    document.getElementById("user-content").style.display = "block";
    alert("Access Granted! Welcome " + responsePayload.given_name);
  }

  const DICT_API_KEY = "b603a6c7-2d98-4162-befb-33458a20aff5";
  async function lookupWord() {
    const word = document.getElementById('wordInput').value.trim();
    const resultDiv = document.getElementById('wordResult');
    if (!word) return;
    try {
      const res = await fetch(`https://www.dictionaryapi.com/api/v3/references/ithesaurus/json/${word}?key=${DICT_API_KEY}`);
      const data = await res.json();
      const entry = data[0];
      resultDiv.innerHTML = `<div style="background:#fff; padding:15px; border-radius:10px; border:1px solid #ddd; text-align:left; max-width:500px; margin:auto;">
        <h4>${entry.hwi.hw}</h4>
        <p><strong>Definition:</strong> ${entry.shortdef[0]}</p>
      </div>`;
    } catch(err) { resultDiv.innerHTML = "Error fetching data."; }
  }
</script>
